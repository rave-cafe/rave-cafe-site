<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rave cafe</title>
    <link rel="stylesheet" href="/assets/index.css" />
    <style>
      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .rotating-image {
        animation: rotate 8s linear infinite;
        opacity: 1;
        transition: opacity 0.3s ease-in;
      }

      .fade-out {
        opacity: 0;
      }
    </style>
  </head>
  <body class="m-0 p-0 bg-[#171717] flex justify-center items-center min-h-screen">
    <a href="/tables" id="tableLink">
      <img
        class="rotating-image cursor-pointer w-[300px] h-auto"
        src="https://res.cloudinary.com/dy5musoby/image/upload/v1767067584/smile-nobg_ixjweh.png"
        alt="smile"
        id="mainImage"
      />
    </a>

    <script>
      document.getElementById('tableLink').addEventListener('click', function(e) {
        e.preventDefault();
        const img = document.getElementById('mainImage');

        img.classList.add('fade-out');

        setTimeout(() => {
          window.location.href = '/tables';
        }, 300);
      });
    </script>
  </body>
</html>
